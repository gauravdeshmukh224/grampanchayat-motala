<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ग्रामपंचायत गणेशवाडी - लाँचिंग पेज</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #e67931;
      --primary-dark: #e75c0b;
      --primary-light: #c26e2a;
      --secondary: #e67e22;
      --secondary-dark: #d35400;
      --accent: #16a085;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --muted: #94a3b8;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --radius: 8px;
      --radius-lg: 12px;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      line-height: 1.6;
      font-size: 16px;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
      position: relative;
    }
    
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(26, 75, 140, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(230, 126, 34, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(22, 160, 133, 0.15) 0%, transparent 50%);
      z-index: -1;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
    }
    
    /* Logo Styles */
    .main-logo {
      width: 150px;
      height: 150px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 4rem;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 5px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
      animation: pulse 2s infinite;
    }
    
    .main-logo::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      background: linear-gradient(45deg, 
        transparent, 
        rgba(255, 255, 255, 0.1), 
        transparent);
      z-index: -1;
      border-radius: 50%;
    }
    
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(26, 75, 140, 0.7);
      }
      70% {
        box-shadow: 0 0 0 20px rgba(26, 75, 140, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(26, 75, 140, 0);
      }
    }
    
    /* Main Title Styles */
    .main-title {
      font-size: 3.2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      background: linear-gradient(135deg, #fff 0%, #e6f7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
    }
    
    .main-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 4px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      border-radius: 2px;
    }
    
    .subtitle {
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 2rem;
      color: #c2e0ff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    
    /* Ceremony Text */
    .ceremony-text {
      font-size: 1.8rem;
      font-weight: 600;
      color: #ffd700;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      margin: 2rem 0;
      padding: 1rem 2rem;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: inline-block;
    }
    
    /* Welcome Message */
    .welcome-message {
      font-size: 1.2rem;
      line-height: 1.8;
      max-width: 700px;
      margin: 0 auto 3rem;
      color: #e6f7ff;
      background: rgba(255, 255, 255, 0.05);
      padding: 1.5rem 2rem;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }
    
    /* Start Button Styles */
    .start-btn-container {
      margin: 3rem 0;
      position: relative;
    }
    
    .start-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 1.5rem 3.5rem;
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 1.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      text-align: center;
      text-decoration: none;
      box-shadow: 
        0 10px 20px rgba(230, 126, 34, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      z-index: 1;
      min-width: 300px;
    }
    
    .start-btn:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 
        0 20px 40px rgba(230, 126, 34, 0.4),
        0 0 0 2px rgba(255, 255, 255, 0.2);
      background: linear-gradient(135deg, var(--secondary-dark), var(--secondary));
    }
    
    .start-btn:active {
      transform: translateY(-4px) scale(1.02);
    }
    
    .start-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, 
        rgba(255,255,255,0.2) 0%, 
        rgba(255,255,255,0.1) 50%, 
        rgba(255,255,255,0.2) 100%);
      z-index: -1;
    }
    
    .start-btn i {
      font-size: 2rem;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }
    
    .start-btn span {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    /* Button Glow Effect */
    .start-btn-container::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      height: 100px;
      background: radial-gradient(circle, rgba(230, 126, 34, 0.4) 0%, transparent 70%);
      z-index: 0;
      filter: blur(20px);
      animation: glow 3s infinite alternate;
    }
    
    @keyframes glow {
      0% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }
    
    /* Instructions */
    .instructions {
      margin-top: 2rem;
      color: #a3c8ff;
      font-size: 1rem;
      font-style: italic;
      opacity: 0.9;
    }
    
    /* Footer */
    .footer {
      margin-top: 3rem;
      color: #94a3b8;
      font-size: 0.9rem;
      text-align: center;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 600px;
    }
    
    /* Countdown Timer (Optional) */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0;
    }
    
    .countdown-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 1rem;
      min-width: 80px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .countdown-value {
      font-size: 2rem;
      font-weight: 700;
      color: #ffd700;
    }
    
    .countdown-label {
      font-size: 0.8rem;
      color: #c2e0ff;
      margin-top: 0.3rem;
    }
    
    /* Responsive Styles */
    @media (max-width: 768px) {
      .main-logo {
        width: 130px;
        height: 130px;
        font-size: 3.5rem;
        margin-bottom: 1.5rem;
      }
      
      .main-title {
        font-size: 2.5rem;
      }
      
      .subtitle {
        font-size: 1.3rem;
      }
      
      .ceremony-text {
        font-size: 1.5rem;
        padding: 0.8rem 1.5rem;
      }
      
      .welcome-message {
        font-size: 1.1rem;
        padding: 1.2rem 1.5rem;
      }
      
      .start-btn {
        font-size: 1.6rem;
        padding: 1.2rem 2.5rem;
        min-width: 280px;
      }
      
      .start-btn i {
        font-size: 1.8rem;
      }
      
      .start-btn-container::after {
        width: 300px;
        height: 90px;
      }
    }
    
    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }
      
      .main-logo {
        width: 110px;
        height: 110px;
        font-size: 3rem;
        margin-bottom: 1.2rem;
      }
      
      .main-title {
        font-size: 2rem;
      }
      
      .main-title::after {
        width: 120px;
        height: 3px;
      }
      
      .subtitle {
        font-size: 1.1rem;
      }
      
      .ceremony-text {
        font-size: 1.3rem;
        padding: 0.7rem 1.2rem;
      }
      
      .welcome-message {
        font-size: 1rem;
        padding: 1rem 1.2rem;
      }
      
      .start-btn {
        font-size: 1.4rem;
        padding: 1rem 2rem;
        min-width: 250px;
        gap: 0.8rem;
      }
      
      .start-btn i {
        font-size: 1.6rem;
      }
      
      .start-btn-container::after {
        width: 270px;
        height: 80px;
      }
      
      .countdown {
        gap: 1rem;
      }
      
      .countdown-item {
        min-width: 70px;
        padding: 0.8rem;
      }
      
      .countdown-value {
        font-size: 1.7rem;
      }
    }
    
    @media (max-width: 360px) {
      .main-title {
        font-size: 1.8rem;
      }
      
      .start-btn {
        font-size: 1.3rem;
        padding: 0.9rem 1.8rem;
        min-width: 220px;
      }
      
      .start-btn-container::after {
        width: 240px;
        height: 75px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Main Logo -->
    <div class="main-logo">
      <i class="fas fa-landmark"></i>
    </div>
    
    <!-- Main Title -->
    <h1 class="main-title">ग्रामपंचायत मोताळा </h1>
    <p class="subtitle">पंचायत समिती मोताळा
जिल्हा बुलढाणा</p>
    
    <!-- Ceremony Text -->
    <div class="ceremony-text">ग्रामपंचायत संकेतस्थळ लोकार्पण सोहळा</div>
    
    <!-- Start Button -->
    <div class="start-btn-container">
      <button class="start-btn" id="startButton">
        <i class="fas fa-play-circle"></i>
        <span>सुरू करा</span>
      </button>
    </div>
    
    <!-- Welcome Message -->
    <div class="welcome-message">
      <p>पंचायत समिती मोताळा मधील सर्ग्राव मपंचायत संकेतस्थळाचे लोकार्पण करण्यात येत आहे.</p>
      <p style="margin-top: 1rem; font-weight: 600; color: #ffd700;">
        "आजपासून लोकांच्या सेवेमध्ये ग्रामपंचायत संकेतस्थळ समाविष्ट करण्यात आले आहे."
      </p>
    </div>
  </div>

  <script>
    // Store the original button HTML
    const originalButtonHTML = `
      <i class="fas fa-play-circle"></i>
      <span>सुरू करा</span>
    `;

    // Initialize button state when page loads
    function initializeButton() {
      const startButton = document.getElementById('startButton');
      startButton.innerHTML = originalButtonHTML;
      startButton.disabled = false;
      startButton.style.transform = 'translateY(0) scale(1)';
      startButton.style.boxShadow = 
        '0 10px 20px rgba(230, 126, 34, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1)';
    }

    // Start Button Functionality
    document.getElementById('startButton').addEventListener('click', function() {
      const button = this;
      
      // Add click effect
      button.style.transform = 'scale(0.95)';
      button.style.boxShadow = '0 5px 15px rgba(230, 126, 34, 0.2)';
      
      // Show loading state
      button.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>लोड होत आहे...</span>';
      button.disabled = true;
      
      // Prevent multiple clicks
      button.removeEventListener('click', arguments.callee);
      
      // Simulate loading delay for better UX
      setTimeout(() => {
        // Redirect to index.html
        window.location.href = 'index.html';
      }, 800);
    });
    
    // Add hover effects
    const startBtn = document.getElementById('startButton');
    startBtn.addEventListener('mouseenter', function() {
      if (!this.disabled) {
        this.style.transform = 'translateY(-8px) scale(1.05)';
      }
    });
    
    startBtn.addEventListener('mouseleave', function() {
      if (!this.disabled) {
        this.style.transform = 'translateY(0) scale(1)';
      }
    });
    
    // Check for browser navigation (back/forward buttons)
    window.addEventListener('pageshow', function(event) {
      // If page is loaded from cache (like when using back button)
      if (event.persisted) {
        initializeButton();
      }
    });
    
    // Initialize button on page load
    document.addEventListener('DOMContentLoaded', initializeButton);
    
    // Also initialize when page is fully loaded
    window.addEventListener('load', initializeButton);
    
    // Optional: Reset button if user stays on page for a while
    setTimeout(initializeButton, 5000);
  </script>
</body>
</html>
